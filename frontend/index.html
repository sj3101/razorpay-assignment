<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimbursement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="view active">
            <div class="auth-container glass">
                <h1 class="logo">Reimburse<span>App</span></h1>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('login')">Login</button>
                    <button class="tab" onclick="switchTab('register')">Register</button>
                </div>

                <form id="login-form" class="form active">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="name@company.com">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn primary">Sign In</button>
                </form>

                <form id="register-form" class="form">
                    <div class="input-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required placeholder="name@company.com">
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="••••••••">
                    </div>
                    <div class="input-group">
                        <label for="reg-role">Role</label>
                        <select id="reg-role" required>
                            <option value="EMP">Employee</option>
                            <option value="RM">Reporting Manager</option>
                            <option value="APE">Accounts Payable Executive</option>
                            <option value="CFO">Chief Financial Officer</option>
                        </select>
                    </div>
                    <button type="submit" class="btn primary">Create Account</button>
                </form>
                <div id="auth-error" class="error-msg"></div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view">
            <nav class="navbar glass">
                <div class="nav-brand">Reimburse<span>App</span></div>
                <div class="nav-user">
                    <span id="user-greeting">Welcome, User</span>
                    <button class="btn secondary small" onclick="logout()">Logout</button>
                </div>
            </nav>

            <main class="dashboard-content">
                <div class="actions-panel glass">
                    <h2>Submit New Reimbursement</h2>
                    <form id="reimbursement-form">
                        <div class="input-group">
                            <label for="reimb-title">Title</label>
                            <input type="text" id="reimb-title" required placeholder="e.g. Client Dinner">
                        </div>
                        <div class="input-group">
                            <label for="reimb-amount">Amount</label>
                            <input type="number" id="reimb-amount" step="0.01" required placeholder="0.00">
                        </div>
                        <div class="input-group">
                            <label for="reimb-desc">Description</label>
                            <textarea id="reimb-desc" rows="3" placeholder="Optional details..."></textarea>
                        </div>
                        <button type="submit" class="btn primary">Submit Claim</button>
                    </form>
                </div>

                <div class="list-panel glass">
                    <h2>My Reimbursements</h2>
                    <div id="reimbursements-list" class="reimbursements-grid">
                        <!-- Items injected here -->
                    </div>
                </div>

                <div id="update-status-panel" class="actions-panel glass" style="display: none; margin-top: 2rem;">
                    <h2>Review Reimbursement (Managers Only)</h2>
                    <form id="status-form">
                        <div class="input-group">
                            <label for="status-id">Reimbursement ID</label>
                            <input type="text" id="status-id" required placeholder="UUID">
                        </div>
                        <div class="input-group">
                            <label for="status-action">Action</label>
                            <select id="status-action" required>
                                <option value="APPROVED">Approve</option>
                                <option value="REJECTED">Reject</option>
                            </select>
                        </div>
                        <button type="submit" class="btn primary">Update Status</button>
                    </form>
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
